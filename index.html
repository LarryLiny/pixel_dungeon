  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      /* Prevent iOS bounce/overscroll */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      /* Prevent text selection */
      -webkit-user-select: none;
      user-select: none;
      /* Prevent touch callouts */
      -webkit-touch-callout: none;
      touch-action: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-title {
      font-family: 'Courier New', monospace;
      font-size: 2.5rem;
      font-weight: bold;
      color: #ffdd44;
      text-shadow: 0 0 20px rgba(255, 221, 68, 0.5), 0 0 40px rgba(255, 221, 68, 0.2);
      letter-spacing: 0.15em;
      animation: title-glow 2s ease-in-out infinite alternate;
    }
    .loading-subtitle {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #666680;
      margin-top: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .loading-bar-container {
      width: 200px;
      height: 4px;
      background: #2a2a4e;
      border-radius: 2px;
      margin-top: 2rem;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      width: 30%;
      background: #ffdd44;
      border-radius: 2px;
      animation: loading-slide 1.5s ease-in-out infinite;
    }
    .loading-hint {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #444460;
      margin-top: 1.5rem;
      letter-spacing: 0.1em;
    }
    @keyframes title-glow {
      from { text-shadow: 0 0 20px rgba(255, 221, 68, 0.5), 0 0 40px rgba(255, 221, 68, 0.2); }
      to   { text-shadow: 0 0 30px rgba(255, 221, 68, 0.8), 0 0 60px rgba(255, 221, 68, 0.3); }
    }
    @keyframes loading-slide {
      0%   { transform: translateX(-100%); width: 40%; }
      50%  { width: 70%; }
      100% { transform: translateX(350%); width: 40%; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-title">像素地牢</div>
    <div class="loading-subtitle">Pixel Dungeon</div>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-hint">正在加载地牢...</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
  <script>
    // Hide loading screen once game canvas is ready
    function hideLoadingScreen() {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function() { el.remove(); }, 600);
      }
    }
    // Fallback: hide after 5 seconds regardless
    setTimeout(hideLoadingScreen, 5000);
    // Also listen for game ready event
    window.addEventListener('game-ready', hideLoadingScreen);
  </script>
</body>
